[Text_InfoDW]
Text0 = "Giới Thiệu Về Phù Thủy"
Text1 = "Một số người cố gắng để có những thân thể cường tráng"
Text2 = "những quy luật của thiên nhiên để làm lợi cho chính họ."
Text3 = "Phù Thủy có thể dùng các phép thuật để tấn công kẻ thù."
Text4 = "Ngoài ra, anh còn ta có thể yêu cầu sự hỗ trợ từ những"
Text5 = "linh hồn bí ẩn. Mọi người đều e ngại sức mạnh phép thuật"
Text6 = "của Phù Thủy nên anh ta thường sống một mình. Tuy nhiên"
Text7 = "vẻ bề ngoài yếu ớt có thể làm bạn có suy nghĩ sai lệch"
Text8 = "về anh ta, đừng để  bị đánh lừa. Nhiều chiến binh"
Text9 = "đã bất ngờ bị nhấn chìm trong lửa trước khi chạm đến Phù Thủy"
Text10 = "Phù Thủy có một danh sách phép thuật tấn công riêng."
Text11 = "Dù có sức mạnh nhưng nhiều phép thuậtcủa họ yêu cầu"
Text12 = "thời gian để tìm và tốn một lượng năng lượng khổng lồ để thi triển."
[Text_InfoDK]
Text0 = "Giới Thiệu Về Chiến Binh"
Text1 = "Chiến Binh là hiện thân của sức mạnh và quyền lực.
Text2 = "Trong những trận đánh càn, họ có thể giết chết 
Text3 = "những dòng nhân vật khác ngay khi đã bị thương rất nặng.
Text4 = "Nhờ khả năng sống còn tuyệt vời, Chiến Binh có khả năng mạo hiểm
Text5 = "một mình mà không hề gặp bất kỳ khó khăn nào.
Text6 = "Anh ta có thể mang trên người những loại giáp trụ khác nhau
Text7 = "sử dụng những loại vũ khí khác nhau như Gươm, Búa hay Giáo.
Text8 = "Kỹ năng của Chiến Binh không tốn quá nhiều năng lượng.
Text9 = "Vì thế Chiến Binh thường là sự lựa chọn của những người mới chơi.
Text10 = "Thêm vào đó,Chiến Binh sẽ có thêm kỹ năng đặc biệt
Text11 = "khi cưỡi trên Quái điểu.
[Text_InfoELF]
Text0 = "Giới Thiệu Về Tiên Nữ"
Text1 = "Tiên Nữ của vùng Noria là nhân vật thuộc những dòng tộc cổ xưa."
Text2 = "Họ cho rằng họ là dòng tộc đầu tiên của MU trước cả con người "
Text3 = ".Một Tiên Nữ ở Noria đã truyền lại rằng họ có một vẻ đẹp huyền ảo"
Text4 = "Tuy họ có vẻ tránh né những trận chiến nhưng không thể nói rằng"
Text5 = "họ nhút nhát. Các Tiên Nữ đã dạy cho con người những kỹ năng "
Text6 = "dùng cung điệu nghệ. Không ai có thể chiến thắng Tiên Nữ"
Text7 = "trong một trận chiến bằng cung. Những Tiên Nữ của Noria"
Text8 = "cũng có những giao ước với các dòng tộc khác"
Text9 = "và những hiệp ước đó đã cuốn họ vào các cuộc chiến."
[Text_InfoMG]
Text0 = "Giới Thiệu Về Đấu Sĩ"
Text1 = "Đấu Sĩ có thể sử dụng một loạt các kỹ năng mà Chiến Binh,Phù Thủy"
Text2 = "Mặc dù các kỹ năng chiến đấu và phép thuật không hoàn hảo như"
Text3 = "Chiến Binh hay Phù Thủy nhưng sự kết hợp này làm anh ta là một"
Text4 = "nhân vật đột phá nhất trong các dòng nhân vật."
Text5 = "Đấu Sĩ có khả năng thi triển các đòn đánh quyết định,"
Text6 = "họ có thể sử dụng các món đồ mạnh hay đi vào những vùng đất "
Text7 = "khác nhau với yêu cầu cấp độ thấp hơn các dòng nhân vật khác."
Text8 = "cũng có những giao ước với các dòng tộc khác"
Text9 = "Cuối cùng để có được Đấu Sĩ bạn phải đạt cấp độ 220"
[Text_InfoDL]
Text0 = "Giới Thiệu Về Chúa Tể"
Text1 = "Chúa Tể vung gươm ra hiệu với uy lực của một vị lãnh tụ"
Text2 = "trong các trận chiến. Họ có sức mạnh triệu hồi quạ tinh và chiến mã"
Text3 = "giúp họ đàn áp kẻ thù của mình. Như Đấu Sĩ,họ có thể xâm nhập vào"
Text4 = "những vùng đất và mang trên người những món đồ tốt với "
Text5 = "yêu cầu thấp hơn các dòng nhân vật khác. Bên cạnh đó,"
Text6 = "họ có những phép thuật mới và kỹ thuật chưa "
Text7 = "từng thấy trên lục địa MU. Cuối cùng, để có được Chúa Tể "
Text8 = "bạn phải  đạt cấp độ 250."
[Text_InfoSUM]
Text0 = "Giới Thiệu Về Thuật Sĩ"
Text1 = "Thuật Sĩ được ra đời từ Elbeland, ngôi làng của người ẩn dật"
Text2 = "nằm ở phía Tây Nam của lục địa MU."
Text3 = "Theo truyền thuyết lâu đời, đây là nơi sinh sống của những người có"
Text4 = "khả năng siêu nhiên, họ rất nhạy cảm và dễ dàng giao tiếp được "
Text5 = "với các linh hồn chưa siêu thoát. Do đặc điểm nguồn gốc đó,"
Text6 = "Summoner được thừa hưởng tất cả những phép thuật của tổ tiên"
Text7 = "Ngoài ra họ có kỹ năng hút máu và gọi linh hồn"
Text8 = "để hỗ trợ cho bản thân. Đối thủ khi bị linh hồn đánh trúng"
Text9 = "sẽ bị ếm bùa và mất một Lượng Máu khá lớn."
[Text_InfoRF]
Text0 = "Giới Thiệu Về Thiết Binh"
Text1 = "Thiết Binh (Rage Fighter) thuộc hậu duệ của quân đoàn Royal Knights"
Text2 = "tại vương quốc Kalrutan, Thiết Binh đã thành công khi "
Text3 = "sử dụng chiến thuật dùng sức mạnh cơ thể làm điểm mạnh. "
Text4 = "Với lối di chuyển nhanh nhẹn và ra đòn bất ngờ,"
Text5 = "Thiết Binh luôn tạo cho đối phương rơi vào thế bị động "
Text6 = "không kịp trở tay và hạ gục đối phương một cách nhanh chóng "
Text7 = "bằng thân hình đồ sộ của mình. Ngoài ra nhân vật này cũng "
Text8 = "có khả năng tiêu diệt kẻ địch từ xa với sức sát thương lớn "
Text9 = "từ năng lượng bản thân."
